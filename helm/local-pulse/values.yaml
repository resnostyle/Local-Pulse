# Default values for local-pulse

# Image settings - REQUIRED: set repository to ghcr.io/YOUR_GITHUB_ORG for GHCR
image:
  go:
    repository: ghcr.io/YOUR_GITHUB_ORG
    name: local-pulse-go
    tag: latest
    pullPolicy: IfNotPresent
  python:
    repository: ghcr.io/YOUR_GITHUB_ORG
    name: local-pulse-python
    tag: latest
    pullPolicy: IfNotPresent

# Go web server
go:
  replicas: 1
  resources:
    limits:
      cpu: 500m
      memory: 256Mi
    requests:
      cpu: 100m
      memory: 128Mi

# Celery worker (executes scrape tasks)
celeryWorker:
  replicas: 1
  concurrency: 4
  resources:
    limits:
      cpu: 500m
      memory: 512Mi
    requests:
      cpu: 100m
      memory: 256Mi

# Celery beat (scheduler - only 1 replica)
celeryBeat:
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# Redis - message broker for Celery (deployed as a plain Deployment in this chart)
redis:
  image: redis:7-alpine
  resources:
    limits:
      cpu: 200m
      memory: 128Mi
    requests:
      cpu: 50m
      memory: 64Mi

# MySQL (deployed separately - provide connection details)
mysql:
  host: ""        # Required
  port: "3306"
  database: localpulse
  username: ""    # Required
  # password: set via existingSecret or chart-created secret

# Secrets
# Either provide an existing secret name or set mysql.password + openai.apiKey
# and the chart will create one.
# kubectl create secret generic local-pulse-secrets \
#   --from-literal=MYSQL_PASSWORD=xxx \
#   --from-literal=OPENAI_API_KEY=xxx
existingSecret: ""
mysqlPassword: ""  # Only used when existingSecret is empty

# OpenAI (optional - for AI event normalization)
openai:
  apiKey: ""

# Ingress
ingress:
  enabled: false
  className: nginx
  host: localpulse.example.com
  annotations: {}
