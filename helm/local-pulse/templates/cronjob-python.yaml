apiVersion: batch/v1
kind: CronJob
metadata:
  name: {{ include "local-pulse.fullname" . }}-python
  labels:
    {{- include "local-pulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: python
spec:
  schedule: {{ .Values.python.schedule | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      template:
        metadata:
          labels:
            app.kubernetes.io/component: python
            {{- include "local-pulse.labels" . | nindent 12 }}
        spec:
          restartPolicy: OnFailure
          containers:
            - name: python
              image: "{{ .Values.image.python.repository }}/{{ .Values.image.python.name }}:{{ .Values.image.python.tag }}"
              imagePullPolicy: {{ .Values.image.python.pullPolicy }}
              command: ["python", "main.py", "run"]
              env:
                - name: MYSQL_HOST
                  value: {{ include "local-pulse.mysqlHost" . | quote }}
                - name: MYSQL_PORT
                  value: {{ include "local-pulse.mysqlPort" . | quote }}
                - name: MYSQL_USER
                  value: {{ .Values.mysql.auth.username | default .Values.externalMysql.username | quote }}
                - name: MYSQL_DATABASE
                  value: {{ .Values.mysql.auth.database | default .Values.externalMysql.database | quote }}
              envFrom:
                - secretRef:
                    name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "local-pulse.fullname" .)) }}
              volumeMounts:
                - name: calendars
                  mountPath: /app/config/calendars.yaml
                  subPath: calendars.yaml
                  readOnly: true
              resources:
                {{- toYaml .Values.python.resources | nindent 16 }}
          volumes:
            - name: calendars
              configMap:
                name: {{ include "local-pulse.fullname" . }}-calendars
