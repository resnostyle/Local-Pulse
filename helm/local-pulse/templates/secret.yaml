{{- if not .Values.existingSecret }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "local-pulse.fullname" . }}-secrets
  labels:
    {{- include "local-pulse.labels" . | nindent 4 }}
type: Opaque
stringData:
  MYSQL_PASSWORD: {{ .Values.mysql.auth.password | default "" | quote }}
  {{- if .Values.openai.apiKey }}
  OPENAI_API_KEY: {{ .Values.openai.apiKey | quote }}
  {{- end }}
{{- end }}
