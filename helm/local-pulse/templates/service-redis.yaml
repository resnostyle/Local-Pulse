apiVersion: v1
kind: Service
metadata:
  name: {{ include "local-pulse.fullname" . }}-redis
  labels:
    {{- include "local-pulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: redis
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    app.kubernetes.io/component: redis
    app.kubernetes.io/name: {{ include "local-pulse.name" . }}
    app.kubernetes.io/instance: {{ .Release.Name }}
