{{- if .Values.mysql.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "local-pulse.fullname" . }}-mysql-init
  labels:
    {{- include "local-pulse.labels" . | nindent 4 }}
  annotations:
    "helm.sh/hook": post-install,post-upgrade
    "helm.sh/hook-weight": "5"
    "helm.sh/hook-delete-policy": before-hook-creation
spec:
  ttlSecondsAfterFinished: 300
  template:
    metadata:
      labels:
        {{- include "local-pulse.labels" . | nindent 8 }}
    spec:
      restartPolicy: OnFailure
      containers:
        - name: init
          image: mysql:8
          command:
            - /bin/sh
            - -c
            - |
              echo "Waiting for MySQL..."
              until mysql -h{{ include "local-pulse.mysqlHost" . }} -u{{ .Values.mysql.auth.username }} -p$MYSQL_PASSWORD -e "SELECT 1" 2>/dev/null; do
                sleep 2
              done
              echo "Applying schema..."
              mysql -h{{ include "local-pulse.mysqlHost" . }} -u{{ .Values.mysql.auth.username }} -p$MYSQL_PASSWORD {{ .Values.mysql.auth.database }} < /schema/init.sql
              echo "Schema applied."
          env:
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "local-pulse.fullname" .)) }}
                  key: MYSQL_PASSWORD
          volumeMounts:
            - name: schema
              mountPath: /schema
              readOnly: true
      volumes:
        - name: schema
          configMap:
            name: {{ include "local-pulse.fullname" . }}-schema
{{- end }}
