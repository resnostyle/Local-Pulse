apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "local-pulse.fullname" . }}-go
  labels:
    {{- include "local-pulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: go
spec:
  replicas: {{ .Values.go.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/component: go
      app.kubernetes.io/name: {{ include "local-pulse.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: go
        {{- include "local-pulse.labels" . | nindent 8 }}
    spec:
      containers:
        - name: go
          image: "{{ .Values.image.go.repository }}/{{ .Values.image.go.name }}:{{ .Values.image.go.tag }}"
          imagePullPolicy: {{ .Values.image.go.pullPolicy }}
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            - name: MYSQL_HOST
              value: {{ include "local-pulse.mysqlHost" . | quote }}
            - name: MYSQL_PORT
              value: {{ include "local-pulse.mysqlPort" . | quote }}
            - name: MYSQL_USER
              value: {{ include "local-pulse.mysqlUsername" . | quote }}
            - name: MYSQL_DATABASE
              value: {{ include "local-pulse.mysqlDatabase" . | quote }}
            - name: MYSQL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "local-pulse.fullname" .)) }}
                  key: MYSQL_PASSWORD
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
          resources:
            {{- toYaml .Values.go.resources | nindent 12 }}
