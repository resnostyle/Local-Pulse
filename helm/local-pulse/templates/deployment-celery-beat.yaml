apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "local-pulse.fullname" . }}-celery-beat
  labels:
    {{- include "local-pulse.labels" . | nindent 4 }}
    app.kubernetes.io/component: celery-beat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/component: celery-beat
      app.kubernetes.io/name: {{ include "local-pulse.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
  template:
    metadata:
      labels:
        app.kubernetes.io/component: celery-beat
        {{- include "local-pulse.labels" . | nindent 8 }}
    spec:
      containers:
        - name: celery-beat
          image: "{{ .Values.image.python.repository }}/{{ .Values.image.python.name }}:{{ .Values.image.python.tag }}"
          imagePullPolicy: {{ .Values.image.python.pullPolicy }}
          command:
            - celery
            - -A
            - celery_app
            - beat
            - --loglevel=info
            - --scheduler
            - beat_schedule.DatabaseScheduler
          env:
            - name: MYSQL_HOST
              value: {{ include "local-pulse.mysqlHost" . | quote }}
            - name: MYSQL_PORT
              value: {{ include "local-pulse.mysqlPort" . | quote }}
            - name: MYSQL_USER
              value: {{ include "local-pulse.mysqlUsername" . | quote }}
            - name: MYSQL_DATABASE
              value: {{ include "local-pulse.mysqlDatabase" . | quote }}
            - name: CELERY_BROKER_URL
              value: {{ include "local-pulse.redisUrl" . | quote }}
            - name: CELERY_RESULT_BACKEND
              value: {{ include "local-pulse.redisResultUrl" . | quote }}
          envFrom:
            - secretRef:
                name: {{ .Values.existingSecret | default (printf "%s-secrets" (include "local-pulse.fullname" .)) }}
          volumeMounts:
            - name: calendars
              mountPath: /app/config/calendars.yaml
              subPath: calendars.yaml
              readOnly: true
          resources:
            {{- toYaml .Values.celeryBeat.resources | nindent 12 }}
      volumes:
        - name: calendars
          configMap:
            name: {{ include "local-pulse.fullname" . }}-calendars
