apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "local-pulse.fullname" . }}-calendars
  labels:
    {{- include "local-pulse.labels" . | nindent 4 }}
data:
  calendars.yaml: |
{{ .Files.Get "config/calendars.yaml" | default "calendars: []\n" | indent 4 }}
---
{{- if .Values.mysql.enabled }}
apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "local-pulse.fullname" . }}-schema
  labels:
    {{- include "local-pulse.labels" . | nindent 4 }}
data:
  init.sql: |
{{ .Files.Get "schema/init.sql" | indent 4 }}
{{- end }}
