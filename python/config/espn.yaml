# Sports events config - uses ESPN's public API (api_base_url and game_url_template configurable)
espn:
  api_base_url: "https://site.api.espn.com/apis/site/v2/sports"
  game_url_template: "https://www.espn.com/game/_/gameId/{id}"
  state: North Carolina
  state_code: NC  # for venue.address.state filtering
  # Team locations (team.team.location) that indicate in-state teams
  team_locations:
    - Charlotte   # Hornets
  leagues:
    - sport: basketball
      league: nba
